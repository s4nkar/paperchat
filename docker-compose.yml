services:
  backend:
    build:
      context: .
      target: backend-dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
      - frontend_modules:/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  frontend_modules:
